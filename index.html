<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <h1>BTC</h1>
            <div class="display-wrapper">
                <div class="display-history" id="displayHistory"></div>
                <input type="text" id="display" class="display" value="0" disabled>
            </div>
            
            <div class="buttons-grid">
                <button onclick="clearDisplay()" class="btn btn-function">AC</button>
                <button onclick="deleteLast()" class="btn btn-function">DEL</button>
                <button onclick="appendToDisplay('(')" class="btn btn-function">(</button>
                <button onclick="appendToDisplay(')')" class="btn btn-function">)</button>
                
                <button onclick="appendToDisplay('7')" class="btn btn-number">7</button>
                <button onclick="appendToDisplay('8')" class="btn btn-number">8</button>
                <button onclick="appendToDisplay('9')" class="btn btn-number">9</button>
                <button onclick="appendToDisplay('÷')" class="btn btn-operator">÷</button>
                
                <button onclick="appendToDisplay('4')" class="btn btn-number">4</button>
                <button onclick="appendToDisplay('5')" class="btn btn-number">5</button>
                <button onclick="appendToDisplay('6')" class="btn btn-number">6</button>
                <button onclick="appendToDisplay('×')" class="btn btn-operator">×</button>
                
                <button onclick="appendToDisplay('1')" class="btn btn-number">1</button>
                <button onclick="appendToDisplay('2')" class="btn btn-number">2</button>
                <button onclick="appendToDisplay('3')" class="btn btn-number">3</button>
                <button onclick="appendToDisplay('-')" class="btn btn-operator">-</button>
                
                <button onclick="appendToDisplay('0')" class="btn btn-number btn-zero">0</button>
                <button onclick="appendToDisplay('.')" class="btn btn-number">.</button>
                <button onclick="calculate()" class="btn btn-equals">=</button>
                <button onclick="appendToDisplay('+')" class="btn btn-operator">+</button>
                
                <button onclick="appendToDisplay('√')" class="btn btn-special">√</button>
                <button onclick="appendToDisplay('^')" class="btn btn-special">x²</button>
                <button onclick="appendToDisplay('%')" class="btn btn-special">%</button>
                <button onclick="calculateGD21()" class="btn btn-custom">GD21</button>
                <button onclick="calculateGD24()" class="btn btn-custom">GD24</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
